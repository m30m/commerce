# eyebench: async FastAPI services + Redis + Postgres, wired to
# Prometheus + Grafana, with a load generator for local performance testing.

x-app-base: &app-base
  build:
    context: ./services
  image: eyebench-app:latest
  restart: unless-stopped
  environment: &app-env
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://redis:6379/0
    DB_POOL_MIN: ${DB_POOL_MIN}
    DB_POOL_MAX: ${DB_POOL_MAX}
    CACHE_TTL: ${CACHE_TTL}
    DOWNSTREAM_TIMEOUT: ${DOWNSTREAM_TIMEOUT}
    DOWNSTREAM_RETRIES: ${DOWNSTREAM_RETRIES}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # --- Backing stores ------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # --- Application services ------------------------------------------------
  gateway:
    <<: *app-base
    command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *app-env
      SERVICE_NAME: gateway
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  product:
    <<: *app-base
    command: ["uvicorn", "product.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      <<: *app-env
      SERVICE_NAME: product
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  cart:
    <<: *app-base
    command: ["uvicorn", "cart.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      <<: *app-env
      SERVICE_NAME: cart
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  recommendation:
    <<: *app-base
    command: ["uvicorn", "recommendation.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      <<: *app-env
      SERVICE_NAME: recommendation
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    <<: *app-base
    command: ["uvicorn", "worker.main:app", "--host", "0.0.0.0", "--port", "8004"]
    environment:
      <<: *app-env
      SERVICE_NAME: worker
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Observability -------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=6h"
    ports:
      - "9090:9090"

  # Per-container CPU / memory / network / filesystem metrics — the no-k8s
  # equivalent of what the kubelet's embedded cAdvisor exposes in Kubernetes.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    command:
      - "--docker_only=true"          # only report real containers, skip system cgroups
      - "--housekeeping_interval=5s"  # match Prometheus scrape_interval
    volumes:
      - /:/rootfs:ro
      # mount the socket file explicitly (same as the alloy service) — on Docker
      # Desktop the host's /var/run/docker.sock is a symlink that won't resolve
      # inside the container if you bind-mount the whole /var/run directory.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "8080:8080"

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"

  # Grafana Alloy: reads container logs from the docker socket and ships them
  # to Loki. (Promtail's replacement — Promtail is now end-of-life.)
  alloy:
    image: grafana/alloy:v1.5.1
    restart: unless-stopped
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloydata:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  # --- Load generator ------------------------------------------------------
  loadgen:
    build:
      context: ./load
    image: eyebench-loadgen:latest
    restart: unless-stopped
    environment:
      GATEWAY_URL: http://gateway:8000
      RPS: ${RPS}
      DURATION_S: ${DURATION_S}
      READ_FRACTION: ${READ_FRACTION}
      ZIPF_S: ${ZIPF_S}
      NUM_PRODUCTS: ${NUM_PRODUCTS}
      NUM_USERS: ${NUM_USERS}
      WARMUP_S: ${WARMUP_S}
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
  lokidata:
  alloydata:
