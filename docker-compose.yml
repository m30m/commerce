# eyebench: async FastAPI services + Redis + Postgres, wired to
# Prometheus + Grafana, with a load generator for local performance testing.

x-app-base: &app-base
  build:
    context: ./services
  image: eyebench-app:latest
  restart: unless-stopped
  # Allow py-spy to attach to the in-container process (PID 1) for on-demand
  # profiling, e.g. `docker compose exec gateway py-spy top --pid 1`.
  cap_add:
    - SYS_PTRACE
  environment: &app-env
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://redis:6379/0
    DB_POOL_MIN: ${DB_POOL_MIN}
    DB_POOL_MAX: ${DB_POOL_MAX}
    CACHE_TTL: ${CACHE_TTL}
    DOWNSTREAM_TIMEOUT: ${DOWNSTREAM_TIMEOUT}
    DOWNSTREAM_RETRIES: ${DOWNSTREAM_RETRIES}
    ACCESS_LOG_SAMPLE_N: ${ACCESS_LOG_SAMPLE_N}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

# Shared config for the py-spy profiling sidecars. Each concrete sidecar sets
# its own `pid: "service:<name>"` (to share the target's process namespace),
# PYROSCOPE_APP and SERVICE, and a depends_on for its target.
x-pyspy-base: &pyspy-base
  image: eyebench-app:latest        # reuse the app image; it ships py-spy
  restart: unless-stopped
  command: ["python", "-m", "common.pyspy_push"]
  cap_add:
    - SYS_PTRACE                     # required for py-spy to read the target's memory
  environment: &pyspy-env
    PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    PYROSCOPE_SAMPLE_RATE: ${PYROSCOPE_SAMPLE_RATE}
    PYSPY_INTERVAL: ${PYSPY_INTERVAL}
    TARGET_PID: "1"

services:
  # --- Backing stores ------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # --- Application services ------------------------------------------------
  gateway:
    <<: *app-base
    command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *app-env
      SERVICE_NAME: gateway
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  product:
    <<: *app-base
    command: ["uvicorn", "product.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      <<: *app-env
      SERVICE_NAME: product
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  cart:
    <<: *app-base
    command: ["uvicorn", "cart.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      <<: *app-env
      SERVICE_NAME: cart
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  recommendation:
    <<: *app-base
    command: ["uvicorn", "recommendation.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      <<: *app-env
      SERVICE_NAME: recommendation
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    <<: *app-base
    command: ["uvicorn", "worker.main:app", "--host", "0.0.0.0", "--port", "8004"]
    environment:
      <<: *app-env
      SERVICE_NAME: worker
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Observability -------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=6h"
    ports:
      - "9090:9090"

  # Per-container CPU / memory / network / filesystem metrics — the no-k8s
  # equivalent of what the kubelet's embedded cAdvisor exposes in Kubernetes.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    # On a cgroup v2 host (all modern Linux) Docker places each container in its
    # own *private* cgroup namespace, so by default cAdvisor only sees its own
    # cgroup and reports zero sibling containers. Joining the host cgroup
    # namespace lets it read every container's cgroup. Docker Desktop's VM does
    # not hit this, which is why the old config appeared to work only on macOS.
    cgroup: host
    command:
      - "--docker_only=true"          # only report real containers, skip system cgroups
      - "--housekeeping_interval=5s"  # match Prometheus scrape_interval
    volumes:
      - /:/rootfs:ro
      # mount the socket file explicitly (same as the alloy service) — on Docker
      # Desktop the host's /var/run/docker.sock is a symlink that won't resolve
      # inside the container if you bind-mount the whole /var/run directory.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "8080:8080"

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"

  # Grafana Alloy: reads container logs from the docker socket and ships them
  # to Loki. (Promtail's replacement — Promtail is now end-of-life.)
  alloy:
    image: grafana/alloy:v1.5.1
    restart: unless-stopped
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloydata:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - loki

  # Grafana Pyroscope: continuous-profiling backend. Ingests folded stacks from
  # the Pyroscope SDK running inside each app process and serves flame graphs to
  # Grafana. 4040 is the ingest + query HTTP port.
  pyroscope:
    image: grafana/pyroscope:1.9.2
    restart: unless-stopped
    command: ["-target=all"]
    volumes:
      - pyroscopedata:/data
    ports:
      - "4040:4040"

  # --- Profiling sidecars (py-spy -> Pyroscope) ----------------------------
  # One per app service. Each joins its target's PID namespace and continuously
  # records + ships folded stacks. Out-of-process, so no GIL cost on the target.
  pyspy-gateway:
    <<: *pyspy-base
    pid: "service:gateway"
    environment:
      <<: *pyspy-env
      PYROSCOPE_APP: eyebench.gateway
      SERVICE: gateway
    depends_on:
      - pyroscope
      - gateway

  pyspy-product:
    <<: *pyspy-base
    pid: "service:product"
    environment:
      <<: *pyspy-env
      PYROSCOPE_APP: eyebench.product
      SERVICE: product
    depends_on:
      - pyroscope
      - product

  pyspy-cart:
    <<: *pyspy-base
    pid: "service:cart"
    environment:
      <<: *pyspy-env
      PYROSCOPE_APP: eyebench.cart
      SERVICE: cart
    depends_on:
      - pyroscope
      - cart

  pyspy-recommendation:
    <<: *pyspy-base
    pid: "service:recommendation"
    environment:
      <<: *pyspy-env
      PYROSCOPE_APP: eyebench.recommendation
      SERVICE: recommendation
    depends_on:
      - pyroscope
      - recommendation

  pyspy-worker:
    <<: *pyspy-base
    pid: "service:worker"
    environment:
      <<: *pyspy-env
      PYROSCOPE_APP: eyebench.worker
      SERVICE: worker
    depends_on:
      - pyroscope
      - worker

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - pyroscope

  # --- Load generator ------------------------------------------------------
  loadgen:
    build:
      context: ./load
    image: eyebench-loadgen:latest
    restart: unless-stopped
    environment:
      GATEWAY_URL: http://gateway:8000
      RPS: ${RPS}
      DURATION_S: ${DURATION_S}
      READ_FRACTION: ${READ_FRACTION}
      ZIPF_S: ${ZIPF_S}
      NUM_PRODUCTS: ${NUM_PRODUCTS}
      NUM_USERS: ${NUM_USERS}
      WARMUP_S: ${WARMUP_S}
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
  lokidata:
  alloydata:
  pyroscopedata:
