# Ingress between loadgen and the gateway.
#
# WHY: kube-proxy load-balances a ClusterIP Service at L4 (per *connection*).
# The loadgen holds long-lived keepalive connections, so hitting the Service
# directly would pin each connection to one gateway pod and skew load across
# replicas. An L7 ingress terminates the client connection and balances each
# *request* across the gateway endpoints (round-robin by default) while keeping
# warm upstream keepalive connections to the pods — even spread + connection
# reuse.
#
# No `host:` rule, so the controller routes purely on path and the loadgen can
# target the controller Service directly without DNS/Host-header juggling.
#
# Prereq (minikube):  minikube addons enable ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: eyebench
  annotations:
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
    # Keep a warm pool of upstream connections to the gateway pods.
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "200"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "10"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
