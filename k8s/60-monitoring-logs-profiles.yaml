# Logs + profiles plane, all in the `monitoring` namespace:
#   Loki (logs)  •  Pyroscope (profiles)  •  Alloy (log shipper)
#
# These used to live in `eyebench`; they now sit next to Prometheus/Grafana in
# `monitoring`. Cross-namespace callers therefore use fully-qualified DNS:
#   - the gateway py-spy sidecar ships to  pyroscope.monitoring.svc:4040
#   - Alloy writes to                       loki.monitoring.svc:3100
#
# Retention is set to 10 years everywhere (see below) — this is a benchmark
# harness and we never want a datastore to age data out mid-analysis.
#
# Storage is still emptyDir, matching the rest of the stack (postgres/redis):
# ephemeral by design. The 10-year retention governs *aging*, not durability —
# swap in PVCs if you also need the data to survive a pod restart.
---
# ----------------------------- Loki -------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki-config.yml: |
    # Minimal single-binary Loki using local filesystem storage. Not HA.
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      # 10 years — effectively "keep everything" for a benchmark run.
      retention_period: 87600h
    compactor:
      working_directory: /loki/compactor
      delete_request_store: filesystem
      retention_enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
  labels: { app: loki }
spec:
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.3.2
          args: ["-config.file=/etc/loki/loki-config.yml"]
          ports: [{ name: http, containerPort: 3100 }]
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /loki }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels: { app: loki }
spec:
  selector: { app: loki }
  ports: [{ name: http, port: 3100, targetPort: http }]
---
# --------------------------- Pyroscope ----------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: monitoring
  labels: { app: pyroscope }
spec:
  replicas: 1
  selector: { matchLabels: { app: pyroscope } }
  template:
    metadata:
      labels: { app: pyroscope }
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.9.2
          args:
            - "-target=all"
            # 10-year block retention (default is 0 = infinite; set explicitly
            # so the intent is visible and matches Loki/Prometheus).
            - "-compactor.blocks-retention-period=87600h"
          ports: [{ name: http, containerPort: 4040 }]
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: monitoring
  labels: { app: pyroscope }
spec:
  selector: { app: pyroscope }
  ports: [{ name: http, port: 4040, targetPort: http }]
---
# ----------------------------- Alloy ------------------------------------
# Tails eyebench pod logs via the Kubernetes API and ships them to Loki.
# Reads via the API server (pods/log), so a single replica is enough — no
# DaemonSet/hostPath needed, and no risk of duplicate ingestion. It runs in
# `monitoring` but still discovers pods in the `eyebench` namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eyebench-alloy
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eyebench-alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eyebench-alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Discover eyebench pods, tail container logs via the Kubernetes API, parse
    // the JSON line, attach labels, push to Loki. Output labels match the compose
    // shipper (job="docker", service, container, level) so the Logs dashboard,
    // querying {job="docker", service=~"$service", level=~"$level"}, works as-is.
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "eyebench"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "service"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        target_label = "job"
        replacement  = "docker"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.process.parse.receiver]
    }

    loki.process "parse" {
      forward_to = [loki.write.default.receiver]
      stage.json {
        expressions = { level = "level" }
      }
      stage.template {
        source   = "level"
        template = "{{ ToLower .Value }}"
      }
      stage.labels {
        values = { level = "" }
      }
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: monitoring
  labels: { app: alloy }
spec:
  replicas: 1
  selector: { matchLabels: { app: alloy } }
  template:
    metadata:
      labels: { app: alloy }
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.5.1
          args:
            - "run"
            - "--server.http.listen-addr=0.0.0.0:12345"
            - "--storage.path=/var/lib/alloy/data"
            - "/etc/alloy/config.alloy"
          ports: [{ name: http, containerPort: 12345 }]
          volumeMounts:
            - { name: config, mountPath: /etc/alloy }
            - { name: data, mountPath: /var/lib/alloy/data }
      volumes:
        - name: config
          configMap: { name: alloy-config }
        - name: data
          emptyDir: {}
