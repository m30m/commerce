# Helm values for kube-prometheus-stack, tuned for eyebench.
#
#   helm install kube-prom prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f k8s/observability/kube-prom-values.yaml
#
# The release name MUST be `kube-prom` — the Prometheus Service DNS
# (kube-prom-kube-prometheus-prometheus) and the built-in datasource uid
# (`prometheus`) that the dashboards query by are derived from it.
#
# This replaces the old sidecar-provisioned datasources.yaml: the chart already
# ships a Prometheus datasource with uid `prometheus` (isDefault), so we only add
# Loki + Pyroscope here, pointing at the Services in the `eyebench` namespace.

grafana:
  # Loki + Pyroscope datasources (Prometheus is provided by the chart, uid=prometheus).
  # Same uids as the compose datasource.yml so the dashboards work unchanged.
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki.eyebench.svc:3100
      editable: false
    - name: Pyroscope
      uid: pyroscope
      type: grafana-pyroscope-datasource
      access: proxy
      url: http://pyroscope.eyebench.svc:4040
      editable: false

  # Auto-load dashboards from any ConfigMap labeled `grafana_dashboard: "1"`,
  # including the eyebench-dashboards ConfigMap in the eyebench namespace.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: false

prometheus:
  prometheusSpec:
    # By default Prometheus only selects ServiceMonitors labeled `release: kube-prom`.
    # The gateway ServiceMonitor (k8s/30-gateway.yaml) is labeled only {app: gateway},
    # so without this it would never be scraped. `false` = select ALL ServiceMonitors
    # cluster-wide regardless of label.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
