# Two namespaces:
#   eyebench    — the application under test (gateway, product, cart, …, plus
#                 its Postgres/Redis).
#   monitoring  — the whole observability plane: Prometheus, Grafana,
#                 kube-state-metrics, node-exporter, Loki, Alloy.
# Keeping them apart means "delete and redeploy the app" never touches the
# metrics/logs history, and vice-versa.
apiVersion: v1
kind: Namespace
metadata:
  name: eyebench
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
