# product / cart / recommendation. All run the same eyebench-app:latest image
# with a different uvicorn module + port, exactly like the compose commands.
# Single replica each — they sit near-idle under this workload; the gateway is
# the thing we scale. (worker follows the identical pattern on :8004 if you want
# it; it is not on the loadgen request path so it is omitted here.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: eyebench
  labels: { app: product }
spec:
  replicas: 1
  selector: { matchLabels: { app: product } }
  template:
    metadata:
      labels: { app: product }
    spec:
      containers:
        - name: product
          image: eyebench-app:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "product.main:app", "--host", "0.0.0.0", "--port", "8001"]
          env:
            - { name: SERVICE_NAME, value: product }
          envFrom:
            - configMapRef: { name: eyebench-config }
            - secretRef: { name: eyebench-secrets }
          ports: [{ name: http, containerPort: 8001 }]
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: eyebench
  labels: { app: product }
spec:
  selector: { app: product }
  ports: [{ name: http, port: 8001, targetPort: http }]
---
