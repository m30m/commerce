# Postgres + Redis. Single-replica Deployments with emptyDir (this is a load-test
# harness, not a durable store — swap for a StatefulSet + PVC if you need
# persistence). Postgres seeds itself from db/init.sql, provided as a ConfigMap:
#
#   kubectl -n eyebench create configmap pg-init --from-file=db/init.sql
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: eyebench
  labels: { app: postgres }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef: { name: eyebench-secrets }
          ports:
            - { name: pg, containerPort: 5432 }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          volumeMounts:
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "eyebench", "-d", "eyebench"] }
            initialDelaySeconds: 3
            periodSeconds: 3
      volumes:
        - name: initdb
          configMap: { name: pg-init }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: eyebench
spec:
  selector: { app: postgres }
  ports:
    - { name: pg, port: 5432, targetPort: pg }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: eyebench
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: eyebench
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
