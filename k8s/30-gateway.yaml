# Gateway: the service we scale. Horizontal scale-out (replicas) is the k8s
# equivalent of `uvicorn --workers`, but each replica is its own pod/process —
# so every replica is a *separate* Prometheus scrape target (no shared-registry
# undercounting). Run ONE uvicorn worker per pod and let `replicas` provide
# the parallelism.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: eyebench
  labels: { app: gateway }
spec:
  replicas: 4                     # scale-out knob: `kubectl -n eyebench scale deploy/gateway --replicas=N`
  selector: { matchLabels: { app: gateway } }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        # --- the app -----------------------------------------------------
        - name: gateway
          image: eyebench-app:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - { name: SERVICE_NAME, value: gateway }
          envFrom:
            - configMapRef: { name: eyebench-config }
            - secretRef: { name: eyebench-secrets }
          ports: [{ name: http, containerPort: 8000 }]
          # This is a single-threaded asyncio event loop: /health shares the loop
          # with request handlers, so under load a reply can lag several seconds
          # even though the pod is healthy and serving 200s.
          #
          # No livenessProbe on purpose. Liveness must catch only unrecoverable
          # deadlock — never overload. A liveness probe here just SIGTERMs busy pods
          # (exit 143), removing capacity and concentrating load on the survivors
          # until every replica crash-loops. Readiness alone handles overload: a
          # saturated pod drops out of the Service endpoints and sheds traffic, then
          # rejoins when it catches up — no restart. Timeout/threshold are loose so
          # a brief loop stall doesn't flap it out of rotation.
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 8
            failureThreshold: 5
          resources:
            requests: { cpu: "500m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: eyebench
  labels: { app: gateway }
spec:
  selector: { app: gateway }
  ports:
    - { name: http, port: 8000, targetPort: http }
# No ServiceMonitor here anymore: we dropped the Prometheus Operator along with
# kube-prometheus-stack. Prometheus (k8s/70-monitoring-prometheus.yaml) now
# discovers every eyebench app Service's endpoints directly via a
# `kubernetes_sd_configs: {role: endpoints}` scrape job, so each gateway pod is
# still scraped individually — per-replica metrics stay correct under scale-out.
#   sum(rate(http_requests_total{service="gateway"}[1m]))            # all pods
#   sum by (pod) (rate(http_requests_total{service="gateway"}[1m]))  # per pod
