# Gateway: the service we scale. Horizontal scale-out (replicas) is the k8s
# equivalent of `uvicorn --workers`, but each replica is its own pod/process —
# so every replica is a *separate* Prometheus scrape target (no shared-registry
# undercounting) and a *separate* profiling target. Run ONE uvicorn worker per
# pod and let `replicas` provide the parallelism.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: eyebench
  labels: { app: gateway }
spec:
  replicas: 4                     # scale-out knob: `kubectl -n eyebench scale deploy/gateway --replicas=N`
  selector: { matchLabels: { app: gateway } }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      # Lets the py-spy sidecar see the uvicorn process in a shared PID
      # namespace. PID 1 becomes the infra/pause container, so the app is NOT
      # PID 1 here (unlike compose's `pid: service:gateway`); the sidecar
      # discovers the real PID by cmdline below.
      shareProcessNamespace: true
      containers:
        # --- the app -----------------------------------------------------
        - name: gateway
          image: eyebench-app:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - { name: SERVICE_NAME, value: gateway }
          envFrom:
            - configMapRef: { name: eyebench-config }
            - secretRef: { name: eyebench-secrets }
          ports: [{ name: http, containerPort: 8000 }]
          # This is a single-threaded asyncio event loop: /health shares the loop
          # with request handlers, so under load (plus an attached py-spy) a reply
          # can lag several seconds even though the pod is healthy and serving 200s.
          #
          # No livenessProbe on purpose. Liveness must catch only unrecoverable
          # deadlock — never overload. A liveness probe here just SIGTERMs busy pods
          # (exit 143), removing capacity and concentrating load on the survivors
          # until every replica crash-loops. Readiness alone handles overload: a
          # saturated pod drops out of the Service endpoints and sheds traffic, then
          # rejoins when it catches up — no restart. Timeout/threshold are loose so
          # a brief loop stall doesn't flap it out of rotation.
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 8
            failureThreshold: 5
          resources:
            requests: { cpu: "500m", memory: "128Mi" }
            # Deliberately NO cpu limit: a single asyncio event loop is one
            # thread, and a CPU *limit* would let CFS throttle it in bursts,
            # adding tail latency. Cap memory only; pace CPU via replica count.
            limits: { memory: "256Mi" }
        # --- py-spy -> Pyroscope sidecar --------------------------------
        - name: pyspy
          image: eyebench-app:latest        # reuse the app image; it ships py-spy
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]           # py-spy reads the target's memory
          env:
            # Pyroscope now lives in the `monitoring` namespace, so address it
            # by its cross-namespace DNS name rather than the bare service name.
            - { name: PYROSCOPE_SERVER_ADDRESS, value: "http://pyroscope.monitoring.svc:4040" }
            - { name: PYROSCOPE_APP, value: "eyebench.gateway" }
            - { name: SERVICE, value: "gateway" }
            - { name: PYROSCOPE_SAMPLE_RATE, value: "100" }
            - { name: PYSPY_INTERVAL, value: "10" }
            # Shared PID namespace: the app is not PID 1 and its pid can change,
            # so pyspy_push re-discovers it by cmdline each cycle (self-healing)
            # rather than capturing a single pid at startup.
            - { name: TARGET_CMDLINE_MATCH, value: "gateway.main" }
            # Stop-the-world sampling: py-spy 0.4.0 --nonblocking panics on this
            # CPython 3.12 build ~1/3 of windows (losing them). The µs-scale pause
            # per sample is a fair price for reliable flame graphs.
            - { name: PYSPY_NONBLOCKING, value: "false" }
          command: ["python", "-m", "common.pyspy_push"]
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: eyebench
  labels: { app: gateway }
spec:
  selector: { app: gateway }
  ports:
    - { name: http, port: 8000, targetPort: http }
# No ServiceMonitor here anymore: we dropped the Prometheus Operator along with
# kube-prometheus-stack. Prometheus (k8s/70-monitoring-prometheus.yaml) now
# discovers every eyebench app Service's endpoints directly via a
# `kubernetes_sd_configs: {role: endpoints}` scrape job, so each gateway pod is
# still scraped individually — per-replica metrics stay correct under scale-out.
#   sum(rate(http_requests_total{service="gateway"}[1m]))            # all pods
#   sum by (pod) (rate(http_requests_total{service="gateway"}[1m]))  # per pod
